name: Daily Kronos Prediction

on:
  schedule:
    # 每天北京时间 16:00 运行 (UTC 8:00)
    - cron: '0 8 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # 1. 先安装 CPU 版 Torch (约 150MB，比普通版快得多)
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          # 2. 安装其他所有依赖
          pip install -r requirements.txt
      - name: Run Prediction Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}      # 必须加这行
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}      # 必须加这行
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }} # 必须加这行
        run: python daily_cron.py
